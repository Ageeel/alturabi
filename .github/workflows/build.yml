name: Build KivyMD Android App
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Server
        uses: actions/checkout@v4

      - name: Calculate Cache Key
        id: cache-key
        run: echo "key=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Cache Buildozer Data
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ steps.cache-key.outputs.key }}

      - name: Build with Buildozer Docker Action
        uses: ArtemSerebrennkov/buildozer-action@v1
        id: buildozer
        with:
          buildozer_version: master
          python_version: 3.11
          # سيقوم هذا الأمر بتحميل كافة المتطلبات وبناء التطبيق
          command: buildozer android release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KivyMD-App-Package
          path: bin/*.apk
