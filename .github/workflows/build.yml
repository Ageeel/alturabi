name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          # تم إزالة الكاش هنا لحل الخطأ

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          pip install flet==0.19.0
          pip install "flet[all]"

      - name: Set Arabic App Name
        run: |
          # تأكد أن هذا المسار موجود في مشروعك، إذا لم يكن موجوداً ستفشل هذه الخطوة أيضاً
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            sed -i 's/android:label="[^"]*"/android:label="تطبيق الترابي"/' android/app/src/main/AndroidManifest.xml
          else
            echo "AndroidManifest.xml not found, skipping name change."
          fi

      - name: Build APK
        run: |
          flet build apk .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-pulse-apk
          path: build/apk/*.apk
