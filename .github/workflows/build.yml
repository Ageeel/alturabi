name: Build Flet Application

on:
  push:
    branches:
      - main # أو اسم الفرع الرئيسي لديك إذا كان master
  pull_request:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب كود المشروع من المستودع
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. إعداد بيئة جافا (مطلوبة لبناء أندرويد)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. إعداد بيئة بايثون وتثبيت الاعتماديات
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip upgrade pip
        pip install -r requirements.txt

    # 4. تثبيت Flutter (Flet تعتمد عليه خلف الكواليس للبناء)
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 5. أمر بناء حزمة الأندرويد باستخدام Flet CLI
    - name: Build Android APK
      run: |
        # تخصيص إصدار flet build وتمرير المجلد الرئيسي والملفات المساعدة
        flet build apk --main main.py

    # 6. رفع ملف الـ APK الناتج كأداة (Artifact) لتحميلها
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flet-app-android
        path: build/apk/*.apk
