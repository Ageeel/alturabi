name: Build Flet Application

on:
  push:
    branches:
      - main  # سيتم البناء تلقائياً عند الدفع (Push) لفرع main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب كود المشروع بالكامل من المستودع
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. إعداد بيئة جافا (مطلوبة لمحرك بناء أندرويد Gradle)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. إعداد بيئة بايثون
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 4. تثبيت مكتبة فلت بالإصدار المحدد 0.19.0
    - name: Install Flet Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet==0.19.0

    # 5. تثبيت Flutter (الذي تعتمد عليه فلت خلف الكواليس لبناء الواجهات وحزم الـ APK)
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 6. أمر بناء حزمة الأندرويد مع حقن الأيقونة واسم التطبيق المخصص
    - name: Build Android APK
      run: |
        flet build apk --main main.py --icon assets/icon.png --product "الترابي لإدارة الديون"

    # 7. رفع ملف الـ APK الناتج كـ Artifact جاهز للتحميل
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flet-app-android
        path: build/apk/*.apk
