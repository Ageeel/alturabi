name: Build Flet Android APK

on:
  push:
    branches:
      - main  # أو اسم الفرع الرئيسي لديك

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب ملفات المشروع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة بايثون
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. تثبيت Flet بالنسخة المحددة 0.19.0
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet[cli]"==0.19.0

      # 5. إعداد Flutter في الخلفية
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 6. خطوة إنشاء ملفات أندرويد وتعديل الـ SDK إجبارياً إلى 34 قبل التجميع
      - name: Prepare and Patch Android SDK
        run: |
          # نطلب من فليت تهيئة ملفات بناء أندرويد أولاً دون تجميعها كاملة
          flet build apk --no-create-app || true
          
          # البحث عن ملف build.gradle الافتراضي وتعديل التوافق ليكون 34 بدلاً من الإعدادات القديمة
          find . -name "build.gradle" -exec sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdkVersion 33/targetSdkVersion 34/g' {} +
          find . -name "build.gradle" -exec sed -i 's/compileSdk = 33/compileSdk = 34/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdk = 33/targetSdk = 34/g' {} +

      # 7. أمر البناء النهائي (سيعتمد الآن على إعدادات الـ SDK 34 المعدلة)
      - name: Build Android APK
        run: |
          flet build apk

      # 8. رفع ملف الـ APK الناتج كـ Artifact للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-flet-app-apk
          path: build/apk/*.apk
