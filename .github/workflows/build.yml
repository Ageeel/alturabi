name: Build KivyMD Android App
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # لاحظ حرف الـ n المكرر في Serebrennikov
        uses: ArtemSerebrennikov/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.11
          command: buildozer android release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KivyMD-App
          path: bin/*.apk
