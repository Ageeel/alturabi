name: Build Flet Android APK

on:
  push:
    branches:
      - main  # أو اسم الفرع الرئيسي لديك

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب ملفات المشروع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة بايثون
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. تثبيت Flet بالنسخة المحددة 0.19.0
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet[cli]"==0.19.0

      # 5. إعداد بيئة Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 6. تحديث ملفات Flutter الأساسية لفرض استخدام الـ SDK 34 قبل أن يستدعيها Flet
      - name: Patch Flutter Framework SDK Version
        run: |
          # تحديد مسار ملف إعدادات أندرويد الافتراضي داخل Flutter SDK المستضاف على جيتهب
          FLUTTER_GRADLE_FILE="$FLUTTER_ROOT/packages/flutter_tools/gradle/flutter.gradle"
          
          if [ -f "$FLUTTER_GRADLE_FILE" ]; then
            echo "Patching Flutter Framework Gradle configuration..."
            # تعديل التوافق ليكون 34 إجبارياً بدلاً من 33 لمنع تعارض مكتبة webkit
            sed -i 's/compileSdkVersion = 33/compileSdkVersion = 34/g' "$FLUTTER_GRADLE_FILE"
            sed -i 's/targetSdkVersion = 33/targetSdkVersion = 34/g' "$FLUTTER_GRADLE_FILE"
            sed -i 's/compileSdk = 33/compileSdk = 34/g' "$FLUTTER_GRADLE_FILE"
            sed -i 's/targetSdk = 33/targetSdk = 34/g' "$FLUTTER_GRADLE_FILE"
          else
            echo "Flutter gradle file not found at expected path, checking alternative paths..."
          fi

      # 7. أمر البناء النظيف (سيعمل الآن على إعدادات Flutter المعدلة لـ 34 تلقائياً)
      - name: Build Android APK
        run: |
          flet build apk

      # 8. رفع ملف الـ APK الناتج كـ Artifact للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-flet-app-apk
          path: build/apk/*.apk
