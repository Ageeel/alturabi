name: Build APK (Kivy / Buildozer)

on:
push:
branches: [ main ]
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

```
steps:
- name: 📥 Checkout
  uses: actions/checkout@v3

- name: 🐍 Set up Python
  uses: actions/setup-python@v4
  with:
    python-version: 3.10

- name: ⚙️ Install system dependencies
  run: |
    sudo apt update
    sudo apt install -y \
      zip unzip openjdk-17-jdk python3-pip \
      autoconf libtool pkg-config zlib1g-dev \
      libncurses5-dev libncursesw5-dev libtinfo5 \
      cmake libffi-dev libssl-dev

- name: 📦 Install Buildozer
  run: |
    pip install --upgrade pip
    pip install buildozer cython

- name: 📁 Build with Buildozer
  run: |
    buildozer android debug

- name: 📤 Upload APK
  uses: actions/upload-artifact@v3
  with:
    name: app-debug-apk
    path: bin/*.apk
```
      - name: First build (prepare environment)
        run: |
          buildozer android debug || true

      - name: Fix SDK licenses and install tools
        run: |
          SDK_PATH="$HOME/.buildozer/android/platform/android-sdk"

          yes | $SDK_PATH/cmdline-tools/latest/bin/sdkmanager --licenses || true

          $SDK_PATH/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-29" \
            "build-tools;29.0.0"

      - name: Final APK build
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: apk
          path: bin/*.apk
