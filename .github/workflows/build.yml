name: Build Flet 0.19.0 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # إصدار 3.10 هو الأكثر استقراراً مع فليت القديم

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11' # إصدارات فليت القديمة تتطلب جافا 11

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9' # إصدار فلاتر المتوافق مع فليت 0.19.0

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet==0.19.0
        pip install fletpack

    - name: Build Android APK
      run: |
        # استخدام fletpack المخصص للإصدارات القديمة
        fletpack apk main.py --assets assets

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flet-app-apk
        path: dist/*.apk
