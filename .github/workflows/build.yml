name: Build Flet Android APK

on:
  push:
    branches:
      - main  # أو اسم الفرع الرئيسي لديك

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب ملفات المشروع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (نسخة 17 متوافقة تماماً مع فلاتر 3.16)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة بايثون
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. تثبيت Flet بالنسخة المحددة 0.19.0
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet[cli]"==0.19.0

      # 5. تثبيت نسخة فلاتر المتوافقة زمنياً وبنيوياً مع فليت 0.19.0 لمنع خطأ الـ Plugins block
      - name: Set up Flutter (Fixed Version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9' # إجبار السيرفر على عدم استخدام 3.44.0 الحديثة
          channel: 'stable'

      # 6. أمر البناء النظيف والمباشر
      - name: Build Android APK
        run: |
          flet build apk

      # 7. رفع ملف الـ APK الناتج كـ Artifact للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-flet-app-apk
          path: build/apk/*.apk
