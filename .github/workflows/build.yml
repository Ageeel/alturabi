name: Build Flet Android APK

on:
  push:
    branches:
      - main  # أو اسم الفرع الرئيسي لديك

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب ملفات المشروع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (تحديث إلى نسخة 17 المستقرة)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة بايثون
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. تثبيت Flet بالنسخة المحددة 0.19.0 مع حزم الأدوات
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet[cli]"==0.19.0

      # 5. إعداد Flutter (نترك الأداة تختار النسخة المتوافقة تلقائياً مع تحديث SDK لضمان الاستقرار)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 6. أمر البناء المصحح مع رفع مستوى الـ SDK لتلبية شروط مكتبة Webkit
      - name: Build Android APK
        run: |
          flet build apk --compile-sdk-version 34

      # 7. رفع ملف الـ APK الناتج كـ Artifact للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-flet-app-apk
          path: build/apk/*.apk
