name: Build APK Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            git \
            zip unzip \
            openjdk-17-jdk \
            wget curl \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev

      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip
          pip install buildozer cython

      - name: First build to create .buildozer
        run: |
          buildozer android debug || true

      - name: Fix AIDL inside Buildozer SDK
        run: |
          SDK_PATH="$HOME/.buildozer/android/platform/android-sdk"

          yes | $SDK_PATH/tools/bin/sdkmanager \
            --sdk_root=$SDK_PATH \
            --licenses || true

          $SDK_PATH/tools/bin/sdkmanager \
            --sdk_root=$SDK_PATH \
            "platform-tools" \
            "platforms;android-29" \
            "build-tools;29.0.0"

      - name: Final APK build
        run: |
          buildozer android debug
