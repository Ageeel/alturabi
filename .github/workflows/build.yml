name: Build Flet Android APK

on:
  push:
    branches:
      - main  # أو اسم الفرع الرئيسي لديك

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب ملفات المشروع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة بايثون
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. تثبيت Flet بالنسخة المحددة 0.19.0
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet[cli]"==0.19.0

      # 5. إعداد Flutter في الخلفية لبناء الـ APK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 6. أمر البناء الصحيح لنسخة 0.19.0 (بدون إضافات زائدة)
      - name: Build Android APK
        run: |
          flet build apk

      # 7. رفع ملف الـ APK الناتج كـ Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-flet-app-apk
          path: build/apk/*.apk
